<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Nebula background -->
  <defs>
    <radialGradient id="nebula1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="30%" cy="70%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="50%" stop-color="#8b00ff"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#nebula1)"/>
  <circle cx="120" cy="150" r="100" fill="url(#nebula2)" opacity="0.6"/>
  
  <!-- Stars -->
  <circle cx="50" cy="50" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="350" cy="80" r="1.5" fill="#fff"/>
  <circle cx="200" cy="30" r="1" fill="#ffd700"/>
  <circle cx="300" cy="300" r="3" fill="#00ffff" opacity="0.7"/>
  <circle cx="80" cy="320" r="2" fill="#ff69b4"/>
  
  <!-- Face silhouette -->
  <circle cx="200" cy="200" r="80" fill="#1a1a3e" stroke="#663399" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="170" cy="180" r="8" fill="#00ffff"/>
  <circle cx="230" cy="180" r="8" fill="#00ffff"/>
  <!-- Galaxy core glow -->
  <circle cx="200" cy="200" r="40" fill="#8b00ff" opacity="0.4"/>
  
  <text x="200" y="350" text-anchor="middle" fill="#fff" font-size="24" font-family="Arial">Nova 🌌</text>
</svg>