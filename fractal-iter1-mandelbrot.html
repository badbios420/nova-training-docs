<!DOCTYPE html>\n<html>\n<head><title>Fractal Iter1: Mandelbrot</title></head>\n<body>\n<script>\nfunction generateMandelbrot(width=300, height=300, maxIter=50) {\n  let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="border:1px solid black;">`;\n  for(let px=0; px<width; px++) {\n    for(let py=0; py<height; py++) {\n      let x0 = (px - width * 0.75) / (0.5 * width);\n      let y0 = (py - height / 2) / (0.5 * height);\n      let x = 0;\n      let y = 0;\n      let iteration = 0;\n      while (x*x + y*y <= 4 && iteration < maxIter) {\n        let xtemp = x*x - y*y + x0;\n        y = 2*x*y + y0;\n        x = xtemp;\n        iteration++;\n      }\n      let hue = (iteration / maxIter) * 360;\n      let saturation = 100;\n      let lightness = 50 + (iteration / maxIter) * 30;\n      svg += `<rect x="${px}" y="${py}" width="1" height="1" fill="hsl(${hue},${saturation}%,${lightness}%)"/>`;\n    }\n  }\n  svg += '</svg>';\n  return svg;\n}\ndocument.body.innerHTML = generateMandelbrot();\n</script>\n</body>\n</html>
