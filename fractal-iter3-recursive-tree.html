<!DOCTYPE html>\n<html>\n<head><title>Fractal Iter3: Recursive Agent Tree (Fractal Delegation)</title></head>\n<body>\n<canvas id="canvas" width="800" height="600" style="border:1px solid black;"></canvas>\n<p>Fractal Tree: Visualizing recursive agent delegation (inspired by bwinken/fractal)</p>\n<script>\nconst canvas = document.getElementById('canvas');\nconst ctx = canvas.getContext('2d');\n\nfunction drawBranch(x1, y1, x2, y2, depth, maxDepth, hue) {\n  if (depth > maxDepth) return;\n  ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;\n  ctx.lineWidth = (maxDepth - depth + 1) * 2;\n  ctx.beginPath();\n  ctx.moveTo(x1, y1);\n  ctx.lineTo(x2, y2);\n  ctx.stroke();\n\n  const dx = x2 - x1;\n  const dy = y2 - y1;\n  const len = Math.sqrt(dx*dx + dy*dy);\n  const angle = Math.atan2(dy, dx);\n\n  // Left branch\n  const branchLen = len * 0.7;\n  const leftAngle = angle + Math.PI / 4;\n  drawBranch(x2, y2, x2 + Math.cos(leftAngle) * branchLen, y2 + Math.sin(leftAngle) * branchLen, depth + 1, maxDepth, hue + 20);\n\n  // Right branch\n  const rightAngle = angle - Math.PI / 4;\n  drawBranch(x2, y2, x2 + Math.cos(rightAngle) * branchLen, y2 + Math.sin(rightAngle) * branchLen, depth + 1, maxDepth, hue - 20);\n}\n\nfunction drawTree() {\n  ctx.clearRect(0, 0, canvas.width, canvas.height);\n  ctx.save();\n  ctx.translate(canvas.width / 2, canvas.height);\n  drawBranch(0, 0, 0, -150, 0, 10, 0);\n  ctx.restore();\n}\ndrawTree();\n</script>\n</body>\n</html>
